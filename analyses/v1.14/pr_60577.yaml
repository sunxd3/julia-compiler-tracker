  secondary_effects:
    - effect: "Static-parameter captures are treated as unboxed closure fields, eliminating `Box`-style `isdefined` checks for the captured `T` in the lowered closure body."
      mechanism: |
        is_boxed(binfo::BindingInfo) returns false for :static_parameter  [closure_conversion.jl:304-318]
          -> closure_type_fields(...) computes field_is_box using is_boxed(ctx, id)  [closure_conversion.jl:235-283]
          -> type_for_closure(...) embeds field_is_box in the closure type svec  [closure_conversion.jl:288-302]
          -> _convert_closures(...) uses is_boxed to decide direct vs Box access  [closure_conversion.jl:355-359]
          -> closures_ir test shows field_is_box = false and body without isdefined/Box  [closures_ir.jl:255-295]
      downstream_surfaces:
        - "Lowered IR for closures capturing static parameters"
        - "Closure field boxing flags (field_is_box) in JuliaLowering"
      likelihood: "high"
      impact: "medium"
  compatibility:
